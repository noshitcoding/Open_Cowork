id: flow:/tasks/import-crew-task
title: CrewTask Import
purpose: Convert selected CrewTask templates into WorkTasks through an explicit import action.
route: /tasks
actors:
  - user
  - TaskListPane
  - TasksView
  - crewStore
  - workTasksStore
domain_objects:
  - domain:crew-task
  - domain:work-task
  - domain:crew
steps:
  - User selects a crew in the Crew templates selector.
  - TaskListPane computes templates whose description is non-empty and id is not already a WorkTask id.
  - Import button stays disabled when there is no selected crew or no importable template.
  - User presses Import from crew.
  - TasksView creates WorkTask records from the selected CrewTask templates.
  - Imported WorkTasks become independent product tasks and can be edited, run, linked to chats, or scheduled.
source_files:
  - app/src/components/tasks/TaskListPane.tsx
  - app/src/components/TasksView.tsx
  - app/src/stores/crewStore.ts
  - app/src/stores/workTasksStore.ts
tests:
  - app/src/components/tasks/TaskPanels.test.tsx
  - app/src/stores/workTasksStore.test.ts
