id: design-system:reference
title: UI Primitive Reference
purpose: Bind product documentation to the current primitive class names and known exceptions before CSS refactors continue.
primitives:
  - ui-button
  - ui-field
  - ui-badge
  - panel
  - card
status_tokens:
  - task-status-idle
  - task-status-running
  - task-status-waiting_approval
  - task-status-completed
  - task-status-failed
  - task-status-canceled
rules:
  - New buttons should use ui-button variants instead of new btn-* classes.
  - Do not mix ui-button with legacy btn-* classes except documented migration exceptions.
  - Direct hex and rgba colors should stay in token blocks or documented terminal/live-monitor exceptions.
  - Terminal dark style is a documented exception because xterm needs explicit theme colors.
known_exceptions:
  - btn-stop remains on one WorkTask stop button until CSS migration removes the mixed class.
  - terminal and live monitor status colors still use direct colors.
source_files:
  - app/src/App.css
  - app/src/components/tasks/TaskRunToolbar.tsx
  - app/src/components/TerminalDock.tsx
tests:
  - app/src/components/tasks/TaskPanels.test.tsx
  - app/src/components/TerminalDock.test.tsx
