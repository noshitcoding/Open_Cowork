id: view:/settings
route: /settings
title: Settings
purpose: Configure providers, agent behavior, memory, terminal/process runtime, MCP, UI, security, and gateway diagnostics.
user_story: As a user I can change runtime and interface preferences from categorized sections without leaving the app.
layout_regions:
  - settings category sidebar
  - active settings panel
  - provider and runtime sections
  - UI and security sections
owned_elements:
  - element:/settings/category-tabs
  - element:/settings/active-panel
primary_actions:
  - button:/settings/category-tabs/select
  - button:/settings/agent/reset-system-prompt
  - button:/settings/gateway/refresh
empty_states:
  - Each category keeps its panel mounted only when active.
loading_states:
  - Gateway refresh and runtime diagnostics expose loading states.
error_states:
  - Gateway and runtime errors render inline in their panels.
data_dependencies:
  - configStore preferences and provider profiles
  - engineStore runtime config
  - coworkStore policy snapshot
  - memory, terminal, MCP and process stores
permissions:
  - security settings control downstream tool approval behavior
source_files:
  - app/src/components/SettingsView.tsx
  - app/src/stores/configStore.ts
  - app/src/stores/engineStore.ts
tests:
  - app/src/components/SettingsView.test.tsx
  - app/src/stores/configStore.ts
