id: view:/crew
route: /crew
title: Crew
purpose: Configure and run multi-agent crews while keeping CrewTask templates distinct from user-facing WorkTasks.
user_story: As a user I can edit crew agents, governance, runtime options, and execution history without accidentally creating product tasks.
layout_regions:
  - crew studio wrapper
  - crew editor panels
  - runtime monitor
  - governance and control plane
owned_elements:
  - element:/crew/studio
  - element:/crew/runtime-monitor
  - element:/crew/governance
primary_actions:
  - button:/crew/studio/create
  - button:/crew/studio/run
  - button:/crew/studio/save-definition
empty_states:
  - Empty crew list invites the user to create a crew.
loading_states:
  - Runtime readiness and history panels load from crew runtime stores.
error_states:
  - Crew runtime and provider failures render in monitor/history panels.
data_dependencies:
  - crewStore local editor state
  - crewRuntimeStore and backend runtime state
  - personality/config profiles
  - starter crews contain plan, execution, and review tasks with explicit dependencies
permissions:
  - crew tools and MCP access inherit crew governance and permission policy
source_files:
  - app/src/components/CrewView.tsx
  - app/src/components/CrewPanel.tsx
  - app/src/components/CrewLiveMonitor.tsx
  - app/src/components/crew/CrewRuntimePanel.tsx
  - app/src/components/crew/CrewGovernancePanel.tsx
  - app/src/stores/crewStore.ts
tests:
  - app/src/components/CrewPanel.test.tsx
  - app/src/components/CrewLiveMonitor.test.tsx
  - app/src/stores/crewStore.test.ts
