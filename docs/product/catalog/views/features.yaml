id: view:/features
route: /features
title: Features
purpose: Operate MCP servers, shared knowledge, skills, and slash commands from one focused workbench.
user_story: As a user I can connect tools, import reusable knowledge, manage skills, and open commands without hunting through settings.
layout_regions:
  - workbench header
  - capability tabs
  - active operational tool
owned_elements:
  - element:/features/capability-tabs
  - element:/features/command-catalog
primary_actions:
  - button:/features/select-capability
  - button:/features/open-slash-command
empty_states:
  - Command search can return no matching commands.
loading_states:
  - MCP, memory, and skills expose their own loading states.
error_states:
  - MCP and knowledge errors remain visible in the active workbench tab.
data_dependencies:
  - configStore MCP server definitions
  - memoryStore shared knowledge
  - skillStore skill definitions
  - commandRegistryStore slash commands
permissions:
  - none
source_files:
  - app/src/components/FeaturesView.tsx
tests:
  - app/src/components/FeaturesView.test.tsx
  - app/src/components/MemoryPanel.test.tsx
  - app/src/engine/memory/knowledgeImport.test.ts
  - app/src/stores/commandRegistryStore.test.ts
