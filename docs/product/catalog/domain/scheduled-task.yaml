id: domain:scheduled-task
title: ScheduledTask
purpose: Automation snapshot that schedules WorkTask or prompt/crew execution without becoming the primary product task identity.
canonical_definition: A ScheduledTask is a backend scheduler row with cron-like expression, active state, prompt or crew snapshot, run metadata, and optional WorkTask id alignment.
allowed_ui_surfaces:
  - /tasks scheduler panel
  - scheduled worker/runtime internals
disallowed_meanings:
  - primary WorkTask identity
  - CrewTask template
source_of_truth:
  - app/src/stores/coworkStore.ts
  - app/src/engine/scheduledWorker.ts
  - app/src-tauri/src/scheduler.rs
source_files:
  - app/src/stores/coworkStore.ts
  - app/src/engine/scheduledWorker.ts
  - app/src-tauri/src/scheduler.rs
  - app/src-tauri/src/db.rs
tests:
