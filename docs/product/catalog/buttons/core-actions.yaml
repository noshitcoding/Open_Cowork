buttons:
  - id: button:/app/shell/toggle-sidebar
    owner_element: element:/app/shell
    label_key: layout.toggleSidebar
    visible_label: icon button with aria-label
    selector: '[data-doc-id="button:/app/shell/toggle-sidebar"]'
    handler: Layout.toggleLeftSidebar
    enabled_when: always
    disabled_when: never
    side_effects: toggles left sidebar visibility in uiStore
    confirmation: none
    destructive: false
    size: icon
    variant: ghost
    accessibility: aria-label names the action
    tests:
      - app/src/App.test.tsx
    source_files:
      - app/src/components/Layout.tsx
  - id: button:/app/shell/toggle-theme
    owner_element: element:/app/shell
    label_key: layout.toggleTheme
    visible_label: icon button with aria-label
    selector: '[data-doc-id="button:/app/shell/toggle-theme"]'
    handler: Layout.toggleTheme
    enabled_when: always
    disabled_when: never
    side_effects: toggles theme and writes body dataset
    confirmation: none
    destructive: false
    size: icon
    variant: ghost
    accessibility: aria-label names the action
    tests:
      - app/src/App.test.tsx
    source_files:
      - app/src/components/Layout.tsx
  - id: button:/app/shell/open-command-palette
    owner_element: element:/app/shell
    label_key: layout.openCommandPalette
    visible_label: Ctrl K
    selector: '[data-doc-id="button:/app/shell/open-command-palette"]'
    handler: Layout.setCommandPaletteOpen(true)
    enabled_when: always
    disabled_when: never
    side_effects: opens command palette modal
    confirmation: none
    destructive: false
    size: compact
    variant: secondary
    accessibility: aria-label names the action and kbd shows shortcut
    tests:
      - app/src/App.test.tsx
    source_files:
      - app/src/components/Layout.tsx
  - id: button:/app/left-sidebar/new-chat
    owner_element: element:/app/left-sidebar
    label_key: + New chat
    visible_label: + New chat
    selector: '[data-doc-id="button:/app/left-sidebar/new-chat"]'
    handler: LeftSidebar.handleNewChat
    enabled_when: always
    disabled_when: never
    side_effects: creates chat thread and navigates to routeRegistry.navigate("/")
    confirmation: none
    destructive: false
    size: md
    variant: primary
    accessibility: visible text label
    tests:
      - app/src/components/LeftSidebar.test.tsx
    source_files:
      - app/src/components/LeftSidebar.tsx
      - app/src/product/routeRegistry.ts
  - id: button:/app/left-sidebar/new-project
    owner_element: element:/app/left-sidebar
    label_key: + New project
    visible_label: + New project
    selector: '[data-doc-id="button:/app/left-sidebar/new-project"]'
    handler: LeftSidebar.handleNewProject
    enabled_when: always
    disabled_when: never
    side_effects: creates project and navigates to routeRegistry.navigate("/projects")
    confirmation: none
    destructive: false
    size: md
    variant: primary
    accessibility: visible text label
    tests:
      - app/src/components/LeftSidebar.test.tsx
    source_files:
      - app/src/components/LeftSidebar.tsx
      - app/src/product/routeRegistry.ts
  - id: button:/app/left-sidebar/manage-projects
    owner_element: element:/app/left-sidebar
    label_key: Manage projects
    visible_label: Manage projects
    selector: '[data-doc-id="button:/app/left-sidebar/manage-projects"]'
    handler: LeftSidebar.handleOpenProjects
    enabled_when: always
    disabled_when: never
    side_effects: navigates to routeRegistry.navigate("/projects") and selects first project when none is active
    confirmation: none
    destructive: false
    size: sm
    variant: secondary
    accessibility: visible text label
    tests:
      - app/src/components/LeftSidebar.test.tsx
    source_files:
      - app/src/components/LeftSidebar.tsx
      - app/src/product/routeRegistry.ts
  - id: button:/app/left-sidebar/open-crew
    owner_element: element:/app/left-sidebar
    label_key: Crew Studio
    visible_label: Crew Studio
    selector: '[data-doc-id="button:/app/left-sidebar/open-crew"]'
    handler: routeRegistry.navigate("/crew")
    enabled_when: always
    disabled_when: never
    side_effects: opens crew route and sets crew mode
    confirmation: none
    destructive: false
    size: sm
    variant: secondary
    accessibility: visible text label
    tests:
      - app/src/components/LeftSidebar.test.tsx
    source_files:
      - app/src/components/LeftSidebar.tsx
      - app/src/product/routeRegistry.ts
  - id: button:/app/left-sidebar/open-task-chat
    owner_element: element:/app/left-sidebar
    label_key: task title
    visible_label: dynamic WorkTask title
    selector: '[data-doc-id="button:/app/left-sidebar/open-task-chat"]'
    handler: LeftSidebar.handleOpenTaskThread
    enabled_when: WorkTask row exists
    disabled_when: never
    side_effects: creates or opens linked chat, sets working folder, navigates to routeRegistry.navigate("/")
    confirmation: none
    destructive: false
    size: row
    variant: ghost
    accessibility: visible task title and status
    tests:
      - app/src/components/LeftSidebar.test.tsx
    source_files:
      - app/src/components/LeftSidebar.tsx
      - app/src/product/routeRegistry.ts
  - id: button:/app/command-palette/close
    owner_element: element:/app/command-palette
    label_key: Esc
    visible_label: Esc
    selector: '[data-doc-id="button:/app/command-palette/close"]'
    handler: CommandPalette.closePalette
    enabled_when: palette open
    disabled_when: never
    side_effects: closes palette and resets selected category
    confirmation: none
    destructive: false
    size: sm
    variant: secondary
    accessibility: visible text label
    tests:
      - app/src/App.test.tsx
    source_files:
      - app/src/components/CommandPalette.tsx
  - id: button:/app/command-palette/select-category
    owner_element: element:/app/command-palette
    label_key: category label
    visible_label: dynamic category label
    selector: '[data-doc-id="button:/app/command-palette/select-category"]'
    handler: CommandPalette.setSelectedCategory
    enabled_when: palette open
    disabled_when: never
    side_effects: filters command list
    confirmation: none
    destructive: false
    size: sm
    variant: segmented
    accessibility: category group has aria-label
    tests:
      - app/src/stores/commandRegistryStore.test.ts
    source_files:
      - app/src/components/CommandPalette.tsx
  - id: button:/app/command-palette/execute-command
    owner_element: element:/app/command-palette
    label_key: command label
    visible_label: dynamic command label
    selector: '[data-doc-id="button:/app/command-palette/execute-command"]'
    handler: CommandPalette.handleExecute
    enabled_when: command result exists
    disabled_when: never
    side_effects: runs legacy navigation or registered command and closes palette
    confirmation: command specific
    destructive: false
    size: row
    variant: ghost
    accessibility: command label and description are visible
    tests:
      - app/src/stores/commandRegistryStore.test.ts
    source_files:
      - app/src/components/CommandPalette.tsx
  - id: button:/tasks/task-create-panel/choose-folder
    owner_element: element:/tasks/task-create-panel
    label_key: Choose folder
    visible_label: Choose folder
    selector: '[data-doc-id="button:/tasks/task-create-panel/choose-folder"]'
    handler: TasksView.handlePickCreateWorkDir
    enabled_when: always
    disabled_when: never
    side_effects: opens folder picker and writes create form workDir
    confirmation: none
    destructive: false
    size: md
    variant: secondary
    accessibility: visible text label and folder icon aria-hidden
    tests:
      - app/src/components/tasks/TaskPanels.test.tsx
    source_files:
      - app/src/components/tasks/TaskCreatePanel.tsx
  - id: button:/tasks/task-create-panel/create
    owner_element: element:/tasks/task-create-panel
    label_key: Create task
    visible_label: Create task
    selector: '[data-doc-id="button:/tasks/task-create-panel/create"]'
    handler: TasksView.handleCreateTask
    enabled_when: prompt is non-empty and working folder is empty or absolute
    disabled_when: prompt is empty, working folder is relative, or crew runner has no crew
    side_effects: creates WorkTask and clears create form
    confirmation: none
    destructive: false
    size: md
    variant: primary
    accessibility: disabled state prevents invalid creation
    tests:
      - app/src/components/tasks/TaskPanels.test.tsx
      - app/src/stores/workTasksStore.test.ts
    source_files:
      - app/src/components/tasks/TaskCreatePanel.tsx
      - app/src/components/TasksView.tsx
  - id: button:/tasks/crew-task-import/import
    owner_element: element:/tasks/crew-task-import
    label_key: Import from crew
    visible_label: Import from crew
    selector: '[data-doc-id="button:/tasks/crew-task-import/import"]'
    handler: TasksView.handleImportCrewTasks
    enabled_when: selected crew has importable CrewTasks not already present as WorkTasks
    disabled_when: no crew selected or no importable templates
    side_effects: creates WorkTasks from CrewTask templates
    confirmation: none
    destructive: false
    size: md
    variant: secondary
    accessibility: disabled state explains import availability through surrounding count and selector
    tests:
      - app/src/components/tasks/TaskPanels.test.tsx
    source_files:
      - app/src/components/tasks/TaskListPane.tsx
      - app/src/components/TasksView.tsx
  - id: button:/tasks/task-list-pane/select-task
    owner_element: element:/tasks/task-list-pane
    label_key: task title
    visible_label: dynamic task title
    selector: '[data-doc-id="button:/tasks/task-list-pane/select-task"]'
    handler: TaskListPane.onSelectTask
    enabled_when: WorkTask exists
    disabled_when: never
    side_effects: changes selected WorkTask id in TasksView
    confirmation: none
    destructive: false
    size: row
    variant: ghost
    accessibility: selected row exposes aria-current
    tests:
      - app/src/components/tasks/TaskPanels.test.tsx
    source_files:
      - app/src/components/tasks/TaskListPane.tsx
  - id: button:/tasks/task-detail-pane/choose-folder
    owner_element: element:/tasks/task-detail-pane
    label_key: Choose folder
    visible_label: Choose folder
    selector: '[data-doc-id="button:/tasks/task-detail-pane/choose-folder"]'
    handler: TasksView.handlePickTaskWorkDir
    enabled_when: selected WorkTask exists
    disabled_when: never
    side_effects: opens folder picker and updates selected WorkTask workDir
    confirmation: none
    destructive: false
    size: md
    variant: secondary
    accessibility: visible text label and folder icon aria-hidden
    tests:
      - app/src/components/tasks/TaskPanels.test.tsx
    source_files:
      - app/src/components/tasks/TaskDetailPane.tsx
  - id: button:/tasks/task-run-toolbar/open-chat
    owner_element: element:/tasks/task-run-toolbar
    label_key: Chat
    visible_label: Chat erstellen or Chat oeffnen
    selector: '[data-doc-id="button:/tasks/task-run-toolbar/open-chat"]'
    handler: TasksView.handleOpenTaskChat
    enabled_when: selected WorkTask exists
    disabled_when: never
    side_effects: creates or opens linked chat thread and navigates to /
    confirmation: none
    destructive: false
    size: md
    variant: secondary
    accessibility: visible text label and message icon aria-hidden
    tests:
      - app/src/components/tasks/TaskPanels.test.tsx
    source_files:
      - app/src/components/tasks/TaskRunToolbar.tsx
      - app/src/components/TasksView.tsx
  - id: button:/tasks/task-run-toolbar/start
    owner_element: element:/tasks/task-run-toolbar
    label_key: Start
    visible_label: Start
    selector: '[data-doc-id="button:/tasks/task-run-toolbar/start"]'
    handler: TasksView.handleRunTask
    enabled_when: prompt exists, task is not busy, crew runner has crew, and workDir is absolute when present
    disabled_when: running, waiting_approval, empty prompt, missing crew, or relative workDir
    side_effects: starts model or crew WorkTask execution and writes status/output
    confirmation: downstream permission approval may be required
    destructive: false
    size: md
    variant: primary
    accessibility: disabled state prevents unsafe run
    tests:
      - app/src/components/tasks/TaskPanels.test.tsx
      - app/src/components/TasksView.schedule.test.tsx
    source_files:
      - app/src/components/tasks/TaskRunToolbar.tsx
      - app/src/components/TasksView.tsx
  - id: button:/tasks/task-run-toolbar/stop
    owner_element: element:/tasks/task-run-toolbar
    label_key: Stop
    visible_label: Stop
    selector: '[data-doc-id="button:/tasks/task-run-toolbar/stop"]'
    handler: TasksView.handleCancelTask
    enabled_when: WorkTask status is running or waiting_approval
    disabled_when: task is not cancelable
    side_effects: aborts controller or crew run and marks task canceled
    confirmation: none
    destructive: false
    size: md
    variant: danger
    accessibility: visible text label and square icon aria-hidden
    tests:
      - app/src/components/tasks/TaskPanels.test.tsx
    source_files:
      - app/src/components/tasks/TaskRunToolbar.tsx
      - app/src/components/TasksView.tsx
  - id: button:/tasks/task-run-toolbar/delete
    owner_element: element:/tasks/task-run-toolbar
    label_key: Delete
    visible_label: Delete
    selector: '[data-doc-id="button:/tasks/task-run-toolbar/delete"]'
    handler: TasksView.handleDeleteTask
    enabled_when: selected WorkTask is not running
    disabled_when: WorkTask status is running
    side_effects: removes matching schedule and deletes WorkTask
    confirmation: none
    destructive: true
    size: md
    variant: danger
    accessibility: visible text label and trash icon aria-hidden
    tests:
      - app/src/components/tasks/TaskPanels.test.tsx
      - app/src/components/TasksView.schedule.test.tsx
    source_files:
      - app/src/components/tasks/TaskRunToolbar.tsx
      - app/src/components/TasksView.tsx
  - id: button:/tasks/task-scheduler-panel/toggle-active
    owner_element: element:/tasks/task-scheduler-panel
    label_key: Active
    visible_label: Active
    selector: '[data-doc-id="button:/tasks/task-scheduler-panel/toggle-active"]'
    handler: TasksView.handleToggleSchedule
    enabled_when: selected WorkTask exists
    disabled_when: never
    side_effects: toggles loaded scheduler row or creates one when enabling with expression
    confirmation: none
    destructive: false
    size: checkbox
    variant: field
    accessibility: checkbox is label-wrapped and status text says active or paused
    tests:
      - app/src/components/tasks/TaskPanels.test.tsx
      - app/src/components/TasksView.schedule.test.tsx
    source_files:
      - app/src/components/tasks/TaskSchedulerPanel.tsx
      - app/src/components/TasksView.tsx
  - id: button:/tasks/task-scheduler-panel/save
    owner_element: element:/tasks/task-scheduler-panel
    label_key: Save
    visible_label: Save
    selector: '[data-doc-id="button:/tasks/task-scheduler-panel/save"]'
    handler: TasksView.handleUpsertSchedule
    enabled_when: schedule expression is non-empty
    disabled_when: schedule expression is empty
    side_effects: creates or updates scheduled_tasks row using WorkTask id
    confirmation: none
    destructive: false
    size: sm
    variant: primary
    accessibility: visible text label and save icon aria-hidden
    tests:
      - app/src/components/tasks/TaskPanels.test.tsx
      - app/src/components/TasksView.schedule.test.tsx
    source_files:
      - app/src/components/tasks/TaskSchedulerPanel.tsx
      - app/src/components/TasksView.tsx
  - id: button:/tasks/task-scheduler-panel/remove
    owner_element: element:/tasks/task-scheduler-panel
    label_key: Remove
    visible_label: Remove
    selector: '[data-doc-id="button:/tasks/task-scheduler-panel/remove"]'
    handler: TasksView.handleRemoveSchedule
    enabled_when: schedule row exists or expression is present
    disabled_when: no schedule row and no expression
    side_effects: clears WorkTask schedule fields and removes scheduler row
    confirmation: none
    destructive: true
    size: sm
    variant: secondary
    accessibility: visible text label and trash icon aria-hidden
    tests:
      - app/src/components/tasks/TaskPanels.test.tsx
      - app/src/components/TasksView.schedule.test.tsx
    source_files:
      - app/src/components/tasks/TaskSchedulerPanel.tsx
      - app/src/components/TasksView.tsx
