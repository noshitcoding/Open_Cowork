buttons:
  - id: button:/app/top-navigation/cowork
    owner_element: element:/app/top-navigation
    label_key: nav.cowork
    visible_label: Cowork
    selector: '[data-doc-id="button:/app/top-navigation/cowork"]'
    handler: routeRegistry.navigate("/")
    enabled_when: always
    disabled_when: never
    side_effects: navigates to the Cowork route and sets work mode
    confirmation: none
    destructive: false
    size: tab
    variant: navigation
    accessibility: link text names the destination
    tests:
      - app/src/App.test.tsx
    source_files:
      - app/src/components/Layout.tsx
      - app/src/product/routeRegistry.ts
