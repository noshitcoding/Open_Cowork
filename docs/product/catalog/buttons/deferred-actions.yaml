    owner_element: element:/cowork/composer
    label_key: Send
    visible_label: Send
    selector: pending:data-doc-id
    handler: CoworkView.handleSend
    enabled_when: composer has prompt and UI is not locked
    disabled_when: UI locked or no sendable input
