buttons:
  - id: button:/cowork/transcript/copy-message
    owner_element: element:/cowork/transcript
    label_key: Copy
    visible_label: Copy
    selector: pending:data-doc-id
    handler: CoworkView navigator.clipboard.writeText
    enabled_when: message content exists
    disabled_when: never
    side_effects: copies message text to clipboard
    confirmation: none
    destructive: false
    size: sm
    variant: ghost
    accessibility: visible text label
    tests:
      - app/src/components/CoworkView.test.ts
    source_files:
      - app/src/components/CoworkView.tsx
  - id: button:/cowork/transcript/use-as-prompt
    owner_element: element:/cowork/transcript
    label_key: Als Prompt nutzen
    visible_label: Als Prompt nutzen
    selector: pending:data-doc-id
    handler: CoworkView.applyPromptToInput
    enabled_when: message content exists
    disabled_when: never
    side_effects: copies message content into composer input
    confirmation: none
    destructive: false
    size: sm
    variant: ghost
    accessibility: visible text label
    tests:
      - app/src/components/CoworkView.test.ts
    source_files:
      - app/src/components/CoworkView.tsx
