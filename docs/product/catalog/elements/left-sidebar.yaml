id: element:/app/left-sidebar
route: /
parent_view: view:/
component: LeftSidebar
purpose: Expose quick chat/project creation, project chat membership, WorkTask chat links, persisted sessions, and context panels.
visible_text:
  - + New chat
  - + New project
  - Manage projects
  - Crew Studio
  - Projects
  - Chats
  - Tasks
  - Sessions
states:
  - projects collapsed
  - chats collapsed
  - tasks collapsed
  - sessions collapsed
  - thread drag active
  - empty groups
buttons:
  - button:/app/left-sidebar/new-chat
  - button:/app/left-sidebar/new-project
  - button:/app/left-sidebar/manage-projects
  - button:/app/left-sidebar/open-crew
  - button:/app/left-sidebar/open-task-chat
infos:
  - info:/app/left-sidebar/no-projects
  - info:/app/left-sidebar/no-tasks
layout_size: resizable sidebar column
accessibility: Sidebar has an aria-label; group toggles expose aria-expanded; delete buttons have aria-labels.
source_files:
  - app/src/components/LeftSidebar.tsx
  - app/src/components/RightSidebar.tsx
  - app/src/product/routeRegistry.ts
  - app/src/stores/projectStore.ts
  - app/src/stores/workTasksStore.ts
tests:
  - app/src/components/LeftSidebar.test.tsx
  - app/src/stores/projectStore.test.ts
