elements:
  - id: element:/app/top-navigation
    route: /
    parent_view: view:/
    component: Layout
    purpose: Render the primary route tabs from the shared product route registry.
    visible_text:
      - Cowork
      - Tasks
      - Crew
      - Projects
      - Features
      - Settings
    states:
      - active route tab
      - inactive route tab
    buttons:
      - button:/app/top-navigation/cowork
      - button:/app/top-navigation/tasks
      - button:/app/top-navigation/crew
      - button:/app/top-navigation/projects
      - button:/app/top-navigation/features
      - button:/app/top-navigation/settings
    infos: []
    layout_size: horizontal top navigation inside the persistent app shell
    accessibility: Top navigation is a nav landmark and each route tab is a link with a stable data-doc-id.
    source_files:
      - app/src/components/Layout.tsx
      - app/src/product/routeRegistry.ts
    tests:
      - app/src/App.test.tsx
  - id: element:/app/shortcut-overlay
    route: /
    parent_view: view:/
    component: Layout
    purpose: Show the keyboard shortcuts generated from the shared route registry and global shell actions.
    visible_text:
      - Shortcuts
      - Command Palette
      - Workspace
      - Tasks
      - Crew area
      - Projects
      - Features
      - Settings
      - Esc
    states:
      - open
      - closed
    buttons:
      - button:/app/shortcut-overlay/close
    infos: []
    layout_size: modal overlay
    accessibility: Uses role dialog with aria-modal and exposes a stable close button.
    source_files:
      - app/src/components/Layout.tsx
      - app/src/product/routeRegistry.ts
    tests:
      - app/src/App.test.tsx
