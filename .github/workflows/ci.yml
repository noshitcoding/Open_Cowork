name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  validate:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: app/package-lock.json

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: app/src-tauri

      - name: Install frontend dependencies
        run: |
          cd app
          npm ci

      - name: TypeScript type check
        run: |
          cd app
          npx tsc -b --noEmit

      - name: Frontend tests
        run: |
          cd app
          npx vitest run

      - name: Rust check
        run: |
          cd app/src-tauri
          cargo check

      - name: Rust tests
        run: |
          cd app/src-tauri
          cargo test

      - name: Rust clippy
        run: |
          cd app/src-tauri
          cargo clippy -- -D warnings

  security:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: cargo-audit
        run: |
          cargo install cargo-audit
          cd app/src-tauri
          cargo audit

      - name: npm audit
        run: |
          cd app
          npm ci
          npm audit --omit=dev || true

      - name: Semgrep scan
        uses: returntocorp/semgrep-action@v1
        with:
          config: p/default

      - name: Trivy filesystem scan
        uses: aquasecurity/trivy-action@0.28.0
        with:
          scan-type: fs
          scan-ref: .
          format: table
          exit-code: '1'
          ignore-unfixed: true
