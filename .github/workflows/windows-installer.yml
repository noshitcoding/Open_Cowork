name: windows-installer

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag to publish, for example v0.1.0'
        required: true
        type: string
      prerelease:
        description: 'Mark the GitHub release as prerelease'
        required: false
        default: false
        type: boolean

permissions:
  attestations: write
  contents: write
  id-token: write

jobs:
  build-installer:
    name: Build Windows installer
    runs-on: windows-latest

    env:
      TAURI_BUILD_TARGET: x86_64-pc-windows-msvc

    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          fetch-depth: 0

      - name: Resolve release tag
        id: release
        shell: pwsh
        run: |
          if ("${{ github.event_name }}" -eq "workflow_dispatch") {
            $tag = "${{ inputs.tag }}"
          } else {
            $tag = "${{ github.ref_name }}"
          }
          "tag=$tag" >> $env:GITHUB_OUTPUT

      - name: Setup Node
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: app/package-lock.json

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable 2026-07-11
        with:
          toolchain: 1.95.0
          targets: x86_64-pc-windows-msvc

      - name: Rust cache
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          workspaces: app/src-tauri

      - name: Install dependencies
        working-directory: app
        run: npm ci

      - name: Install Chromium for UI quality gates
        working-directory: app
        run: npm exec -- playwright install --with-deps chromium

      - name: Verify release source
        working-directory: app
        env:
          RELEASE_TAG: ${{ steps.release.outputs.tag }}
        run: |
          npm run verify
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
          npm run supply-chain:check -- --tag "$env:RELEASE_TAG"
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
          npm audit --audit-level=high
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

      - name: Audit Rust dependencies
        shell: pwsh
        run: |
          cargo install cargo-audit --locked --version 0.22.2
          cargo audit --file app/src-tauri/Cargo.lock

      - name: Build Windows installer
        working-directory: app
        shell: pwsh
        run: |
          $env:CARGO_TARGET_DIR = Join-Path $env:RUNNER_TEMP 'localai-cowork-target'
          npm run installer

      - name: Prepare release assets
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Path release-assets -Force | Out-Null
          Copy-Item -LiteralPath dist-installers\LocalAI-Cowork-Setup.exe -Destination release-assets\LocalAI-Cowork-Setup-x64.exe -Force

      - name: Sign and verify Windows installer
        shell: pwsh
        env:
          LOCALAI_COWORK_CODESIGN_PFX_BASE64: ${{ secrets.LOCALAI_COWORK_CODESIGN_PFX_BASE64 || secrets.OPEN_COWORK_CODESIGN_PFX_BASE64 }}
          LOCALAI_COWORK_CODESIGN_PASSWORD: ${{ secrets.LOCALAI_COWORK_CODESIGN_PASSWORD || secrets.OPEN_COWORK_CODESIGN_PASSWORD }}
          LOCALAI_COWORK_CODESIGN_THUMBPRINT: ${{ secrets.LOCALAI_COWORK_CODESIGN_THUMBPRINT || secrets.OPEN_COWORK_CODESIGN_THUMBPRINT }}
        run: |
          .\app\scripts\sign-windows-installer.ps1 -InstallerPath release-assets\LocalAI-Cowork-Setup-x64.exe

      - name: Generate SBOM, notices, provenance, and checksums
        working-directory: app
        env:
          RELEASE_TAG: ${{ steps.release.outputs.tag }}
        run: |
          npm run supply-chain:sbom -- --output ..\release-assets --tag "$env:RELEASE_TAG"
          npm run supply-chain:release -- --output ..\release-assets --tag "$env:RELEASE_TAG"

      - name: Attest release assets
        uses: actions/attest-build-provenance@0f67c3f4856b2e3261c31976d6725780e5e4c373 # v4.1.1
        with:
          subject-path: release-assets/*

      - name: Attest installer SBOM
        uses: actions/attest-sbom@c604332985a26aa8cf1bdc465b92731239ec6b9e # v4.1.0
        with:
          subject-path: release-assets/LocalAI-Cowork-Setup-x64.exe
          sbom-path: release-assets/localai-cowork.cdx.json

      - name: Upload installer artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: LocalAI-Cowork-Windows-Installer
          path: release-assets/*
          if-no-files-found: error

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@3d0d9888cb7fd7b750713d6e236d1fcb99157228 # v3.0.2
        with:
          tag_name: ${{ steps.release.outputs.tag }}
          name: LocalAI Cowork ${{ steps.release.outputs.tag }}
          target_commitish: ${{ github.sha }}
          prerelease: ${{ github.event_name == 'workflow_dispatch' && inputs.prerelease || false }}
          generate_release_notes: true
          files: release-assets/*
