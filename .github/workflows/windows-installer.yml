name: windows-installer

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag to publish, for example v0.1.0'
        required: true
        type: string
      prerelease:
        description: 'Mark the GitHub release as prerelease'
        required: false
        default: false
        type: boolean

permissions:
  contents: write

jobs:
  build-installer:
    name: Build Windows installer
    runs-on: windows-latest

    env:
      TAURI_BUILD_TARGET: x86_64-pc-windows-msvc

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: app/package-lock.json

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: app/src-tauri

      - name: Install dependencies
        working-directory: app
        run: npm ci

      - name: Build Windows installer
        working-directory: app
        shell: pwsh
        run: |
          $env:CARGO_TARGET_DIR = Join-Path $env:RUNNER_TEMP 'open-cowork-target'
          npm run installer

      - name: Prepare release assets
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Path release-assets -Force | Out-Null
          Copy-Item -LiteralPath dist-installers\Open-Cowork-Setup.exe -Destination release-assets\Open-Cowork-Setup-x64.exe -Force
          Get-FileHash release-assets\Open-Cowork-Setup-x64.exe -Algorithm SHA256 |
            ForEach-Object { "$($_.Hash)  Open-Cowork-Setup-x64.exe" } |
            Set-Content release-assets\Open-Cowork-Setup-x64.exe.sha256

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: Open-Cowork-Windows-Installer
          path: release-assets/*
          if-no-files-found: error

      - name: Resolve release tag
        id: release
        shell: pwsh
        run: |
          if ("${{ github.event_name }}" -eq "workflow_dispatch") {
            $tag = "${{ inputs.tag }}"
          } else {
            $tag = "${{ github.ref_name }}"
          }
          "tag=$tag" >> $env:GITHUB_OUTPUT

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.release.outputs.tag }}
          name: Open Cowork ${{ steps.release.outputs.tag }}
          target_commitish: ${{ github.sha }}
          prerelease: ${{ github.event_name == 'workflow_dispatch' && inputs.prerelease || false }}
          generate_release_notes: true
          files: release-assets/*
